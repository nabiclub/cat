<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>숨은 고양이 찾기</title>
    <style>
        body { text-align: center; background-color: #f4f4f4; font-family: 'Apple SD Gothic Neo', sans-serif; margin: 0; padding: 20px 0; }
        #status { font-size: 22px; font-weight: bold; margin-bottom: 20px; }
        #count { color: #ff4757; font-size: 28px; }

        #game-container {
            position: relative;
            display: inline-block;
            /* 웹(PC)에서 가로 700px 고정 */
            width: 700px !important; 
            max-width: 95vw; 
            margin: 0 auto;
            cursor: default !important;
            border: 5px solid white;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            line-height: 0;
        }

        img#target-img {
            width: 100% !important;
            height: auto !important;
            display: block;
            cursor: default !important;
        }

        .circle {
            position: absolute;
            border: 4px solid #ff4757;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>

    <div id="status">🕵️‍♂️ 찾은 고양이: <span id="count">0</span> / 12</div>

    <div id="game-container">
        <img src="최종그림.jpg" id="target-img" draggable="false">
    </div>

    <script>
        let foundCount = 0;
        const totalCats = 12;
        const foundList = new Set();
        const googleFormUrl = "https://docs.google.com/forms/d/e/1FAIpQLScmhmcfHlquFg68DTqJqikfPwPRqwUyS66LEysWBG6RcxZjSw/viewform?usp=sharing&ouid=112846644520359554445";

        // 알려주신 정확한 원본 해상도 적용
        const refWidth = 1836; 
        const refHeight = 2448; 

        // 고양이 좌표 중심점 (전달해주신 데이터 기반)
        const catAreas = [
            {id:1, x:242, y:2160, r:80},
            {id:2, x:835, y:2100, r:80},
            {id:3, x:1160, y:2050, r:80},
            {id:4, x:1530, y:1980, r:90},
            {id:5, x:200, y:1785, r:80},
            {id:6, x:1605, y:1190, r:90},
            {id:7, x:1245, y:1215, r:100},
            {id:8, x:450, y:965, r:80},
            {id:9, x:640, y:585, r:80},
            {id:10, x:1250, y:805, r:80},
            {id:11, x:945, y:1140, r:120},
            {id:12, x:220, y:890, r:80}
        ];

        const container = document.getElementById('game-container');
        const img = document.getElementById('target-img');

        container.addEventListener('click', function(e) {
            const rect = img.getBoundingClientRect();
            
            // 1. 현재 화면상(700px 등)의 실제 클릭 좌표 구하기
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            // 2. 현재 이미지 크기와 원본(1836x2448)의 비율 계산
            const ratioX = img.clientWidth / refWidth;
            const ratioY = img.clientHeight / refHeight;

            // 3. 클릭 좌표를 원본 해상도 좌표로 역산
            const logicX = mouseX / ratioX;
            const logicY = mouseY / ratioY;

            catAreas.forEach(cat => {
                if (!foundList.has(cat.id)) {
                    // 원본 좌표계에서의 거리 계산
                    const dist = Math.sqrt(Math.pow(logicX - cat.x, 2) + Math.pow(logicY - cat.y, 2));
                    
                    if (dist < cat.r) {
                        foundList.add(cat.id);
                        foundCount++;
                        document.getElementById('count').innerText = foundCount;

                        // 동그라미 생성
                        const circle = document.createElement('div');
                        circle.className = 'circle';
                        // 동그라미 위치는 클릭한 위치(mouseX, mouseY) 그대로 사용
                        circle.style.left = mouseX + 'px';
                        circle.style.top = mouseY + 'px';
                        
                        // 동그라미 크기도 이미지 비율에 맞춰 적절히 조절
                        const cSize = 60 * ratioX; 
                        circle.style.width = cSize + 'px';
                        circle.style.height = cSize + 'px';
                        
                        container.appendChild(circle);

                        if (foundCount === totalCats) {
                            setTimeout(() => {
                                alert("🎉 축하합니다! 12마리를 모두 찾았습니다.\n응모 폼으로 이동합니다.");
                                window.location.href = googleFormUrl;
                            }, 500);
                        }
                    }
                }
            });
        });
    </script>
</body>
</html>
