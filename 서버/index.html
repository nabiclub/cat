<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>숨은 고양이 찾기</title>
    <style>
        /* 1. 웹(PC)에서 무조건 540px로 보이게 강제 고정 */
        #game-container {
            position: relative;
            width: 540px !important; 
            margin: 0 auto;
            border: 5px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            /* 2. 마우스 커서를 화살표로 '박제' */
            cursor: default !important;
            overflow: hidden;
            touch-action: none;
        }

        img#target-img {
            width: 100% !important;
            height: auto !important;
            display: block;
            /* 이미지 위에서도 커서 변화 금지 */
            cursor: default !important;
        }

        /* 클릭했을 때 생기는 빨간 원 */
        .circle {
            position: absolute;
            border: 3px solid #ff4757;
            border-radius: 50%;
            width: 40px; height: 40px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 999;
        }

        #status { font-size: 20px; font-weight: bold; margin: 20px 0; }
    </style>
</head>
<body>

    <div id="status">찾은 고양이: <span id="count">0</span> / 12</div>

    <div id="game-container" id="game-box">
        <img src="최종그림.jpg" id="target-img">
    </div>

    <script>
        let foundCount = 0;
        const totalCats = 12;
        const foundList = new Set();
        const googleFormUrl = "https://docs.google.com/forms/d/e/1FAIpQLScmhmcfHlquFg68DTqJqikfPwPRqwUyS66LEysWBG6RcxZjSw/viewform?usp=sharing&ouid=112846644520359554445";

        // 이미지 원본(1080x1440) 대비 좌표 데이터 (사각형 범위)
        const catAreas = [
            {id:1, x1:180, y1:2120, x2:300, y2:2200},
            {id:2, x1:760, y1:2050, x2:910, y2:2160},
            {id:3, x1:1100, y1:1990, x2:1220, y2:2110},
            {id:4, x1:1470, y1:1880, x2:1590, y2:2100},
            {id:5, x1:130, y1:1730, x2:270, y2:1840},
            {id:6, x1:1530, y1:1120, x2:1680, y2:1260},
            {id:7, x1:1160, y1:1110, x2:1330, y2:1320},
            {id:8, x1:390, y1:900, x2:510, y2:1030},
            {id:9, x1:570, y1:520, x2:710, y2:650},
            {id:10, x1:1190, y1:740, x2:1310, y2:870},
            {id:11, x1:820, y1:1070, x2:1070, y2:1210},
            {id:12, x1:160, y1:830, x2:280, y2:950}
        ];

        const container = document.getElementById('game-container');
        const img = document.getElementById('target-img');

        container.addEventListener('click', function(e) {
            const rect = img.getBoundingClientRect();
            
            // 현재 화면상의 클릭 위치
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            // 이미지가 줄어든 비율 계산 (540px / 1080px 등)
            const ratioX = img.clientWidth / 1080;
            const ratioY = img.clientHeight / 1440;

            // 클릭한 위치를 원본 좌표로 변환
            const logicX = mouseX / ratioX;
            const logicY = mouseY / ratioY;

            catAreas.forEach(cat => {
                if (!foundList.has(cat.id)) {
                    if (logicX >= cat.x1 && logicX <= cat.x2 && logicY >= cat.y1 && logicY <= cat.y2) {
                        foundList.add(cat.id);
                        foundCount++;
                        document.getElementById('count').innerText = foundCount;

                        // 빨간 원 생성
                        const circle = document.createElement('div');
                        circle.className = 'circle';
                        circle.style.left = mouseX + 'px';
                        circle.style.top = mouseY + 'px';
                        container.appendChild(circle);

                        if (foundCount === totalCats) {
                            setTimeout(() => {
                                alert("모두 찾았습니다! 응모 폼으로 이동합니다.");
                                window.location.href = googleFormUrl;
                            }, 500);
                        }
                    }
                }
            });
        });
    </script>
</body>
</html>
