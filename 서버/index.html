<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>숨은 고양이 찾기</title>
    <style>
        body { text-align: center; background-color: #f4f4f4; font-family: sans-serif; }
        
        /* 1. 요청하신 가로 700px로 고정 (모바일에서는 화면에 맞춤) */
        #game-container {
            position: relative;
            display: inline-block;
            width: 700px !important; 
            max-width: 98vw; 
            margin: 0 auto;
            cursor: default !important; /* 커서 고정 */
            border: 5px solid white;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        img#target-img {
            width: 100% !important;
            height: auto !important;
            display: block;
            cursor: default !important;
        }

        /* 클릭 성공 시 나타나는 동그라미 */
        .circle {
            position: absolute;
            border: 4px solid #ff4757;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 999;
            animation: pop 0.3s ease-out;
        }

        @keyframes pop {
            0% { transform: translate(-50%, -50%) scale(0); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        #status { font-size: 22px; font-weight: bold; margin: 20px 0; color: #333; }
        #count { color: #ff4757; font-size: 28px; }
    </style>
</head>
<body>

    <div id="status">🕵️‍♂️ 찾은 고양이: <span id="count">0</span> / 12</div>

    <div id="game-container">
        <img src="최종그림.jpg" id="target-img" draggable="false">
    </div>

    <script>
        let foundCount = 0;
        const totalCats = 12;
        const foundList = new Set();
        const googleFormUrl = "https://docs.google.com/forms/d/e/1FAIpQLScmhmcfHlquFg68DTqJqikfPwPRqwUyS66LEysWBG6RcxZjSw/viewform?usp=sharing&ouid=112846644520359554445";

        // 원본 이미지(1080x1440) 기준 좌표 및 판정 범위 확장
        const catAreas = [
            {id:1, x:240, y:2160, r:60},  // 좌표를 중심점으로 변경하고 반지름(r) 부여
            {id:2, x:835, y:2105, r:70},
            {id:3, x:1160, y:2050, r:70},
            {id:4, x:1530, y:2000, r:80},
            {id:5, x:200, y:1785, r:70},
            {id:6, x:1605, y:1190, r:80},
            {id:7, x:1245, y:1215, r:90},
            {id:8, x:450, y:965, r:70},
            {id:9, x:640, y:585, r:70},
            {id:10, x:1250, y:805, r:70},
            {id:11, x:945, y:1140, r:100},
            {id:12, x:220, y:890, r:70}
        ];

        const container = document.getElementById('game-container');
        const img = document.getElementById('target-img');

        container.addEventListener('click', function(e) {
            const rect = img.getBoundingClientRect();
            
            // 실제 클릭한 위치 (픽셀)
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            // 현재 이미지 크기와 원본의 비율 계산
            const ratioX = img.clientWidth / 1080;
            const ratioY = img.clientHeight / 1440;

            // 클릭 위치를 원본 좌표계로 역산
            const logicX = mouseX / ratioX;
            const logicY = mouseY / ratioY;

            let hit = false;
            catAreas.forEach(cat => {
                if (!foundList.has(cat.id)) {
                    // 중심점으로부터의 거리를 계산하여 범위 판정 (훨씬 정확함)
                    const dist = Math.sqrt(Math.pow(logicX - cat.x, 2) + Math.pow(logicY - cat.y, 2));
                    
                    if (dist < cat.r) { // 반지름(r) 안에 들어오면 정답
                        hit = true;
                        foundList.add(cat.id);
                        foundCount++;
                        document.getElementById('count').innerText = foundCount;

                        // 동그라미 표시
                        const circle = document.createElement('div');
                        circle.className = 'circle';
                        circle.style.left = mouseX + 'px';
                        circle.style.top = mouseY + 'px';
                        
                        // 동그라미 크기도 이미지 크기에 맞춰 조절
                        const cSize = 60 * ratioX;
                        circle.style.width = cSize + 'px';
                        circle.style.height = cSize + 'px';
                        
                        container.appendChild(circle);

                        if (foundCount === totalCats) {
                            setTimeout(() => {
                                alert("🎉 축하합니다! 12마리를 모두 찾았습니다.\n응모 폼으로 이동합니다.");
                                window.location.href = googleFormUrl;
                            }, 500);
                        }
                    }
                }
            });
        });
    </script>
</body>
</html>
